<!DOCTYPE html>
<html>

<head>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 90px;
            padding: 20px;
            padding-bottom: 100vh; /* artificial padding to make the page scrollable */
            box-sizing: border-box;
            font-family: serif;
            font-weight: bold;
            background-color: #f0f0f0;
        }

        .headline {
            text-align: center;
            opacity: 0;
            transform: translateY(-50px);
            transition: all 0.5s;
            margin-bottom: 5px; /* spacing between headlines */.
        }

        .headline.show {
            opacity: 1;
            transform: translateY(0);
        }

        #date-bar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            box-sizing: border-box;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div id="date-bar"></div>


    <script>
        d3.csv('berlusconi/headlines.csv').then(data => {
            // Store all headlines in an array and initialize a counter for the current headline
            let headlines = data;
            let currentHeadline = 0;

            // Function to append a new headline
            function appendHeadline() {
                if (currentHeadline < headlines.length) {
                    let d = headlines[currentHeadline++];

                    // Create a new headline element
                    let headline = document.createElement('div');
                    headline.classList.add('headline');
                    headline.textContent = d.headline;

                    let minSize = 15;
                    let maxSize = 30;
                    let randomSize = Math.floor(Math.random() * (maxSize - minSize) + minSize);
                    headline.style.fontSize = `${randomSize}px`;

                    // Add the headline to the body of the document
                    document.body.appendChild(headline);

                    // Update the date bar
                    document.getElementById('date-bar').textContent = `Date: ${d.Date}`;


                    // Reduce the body's bottom padding by the height of the headline
                    document.body.style.paddingBottom = `calc(100vh - ${headline.offsetHeight}px)`;

                    // Start the animation
                    setTimeout(() => {
                        headline.classList.add('show');
                    }, 10);
                }
            }

            let lastScrollTop = 0;  // keep track of the last scroll position

            function checkScroll() {
                let scrollTop = window.pageYOffset || document.documentElement.scrollTop;  // get current scroll position

                if (scrollTop > lastScrollTop) {  // if scrolling down
                    appendHeadline();
                } else if (scrollTop < lastScrollTop) {  // if scrolling up
                    removeHeadline();
                }

                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;  // update last scroll position
            }

            function removeHeadline() {
                if (currentHeadline > 0) {
                    let d = headlines[--currentHeadline];

                    // Remove the last headline element
                    document.body.removeChild(document.body.lastChild);

                    // Update the date bar
                    document.getElementById('date-bar').textContent = `Date: ${d.Date}`;
                }
            }

            window.addEventListener('scroll', checkScroll);

            // Append a new headline every time the user scrolls to the bottom
            window.onscroll = function () {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
                    appendHeadline();
                }
            };

            // Append the first headline
            appendHeadline();
        });
    </script>
</body>

</html>
